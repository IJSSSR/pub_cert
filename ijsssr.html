<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IJSSSR Certificate Generator</title>
<style>
  /* Global Styles */
  body {
    font-family: "Times New Roman", serif;
    background-color: #f0f2f5;
    margin: 0;
    padding: 0;
    color: #333;
  }

  .container {
    max-width: 1000px;
    margin: 20px auto;
    padding: 20px;
  }

  /* Form Section */
  .form-section {
    background: #fff;
    padding: 30px 35px;
    border-radius: 12px;
    box-shadow: 0 5px 25px rgba(0,0,0,0.1);
    margin-bottom: 30px;
  }

  .form-section h2 {
    text-align: center;
    color: #215868;
    font-size: 30px;
    font-weight: bold;
    margin-bottom: 25px;
  }

  .form-section label {
    display: block;
    margin-top: 15px;
    font-weight: 600;
    font-size: 16px;
    color: #004d40;
  }

  .form-section input, 
  .form-section textarea, 
  .form-section select {
    width: 100%;
    padding: 12px 14px;
    margin-top: 6px;
    border-radius: 8px;
    border: 1px solid #bbb;
    font-size: 15px;
    font-family: "Times New Roman", serif;
    box-sizing: border-box;
  }

  .form-section input::placeholder,
  .form-section textarea::placeholder {
    color: #999;
    opacity: 1;
    font-style: italic;
  }

  .form-section textarea {
    resize: vertical;
  }

  .form-section button {
    background-color: #215868;
    color: #fff;
    border: none;
    padding: 12px 30px;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 20px;
    font-weight: bold;
    transition: background 0.3s;
    margin-right: 10px;
  }

  .form-section button:hover {
    background-color: #1a4452;
  }

  .button-group {
    text-align: center;
    margin-top: 25px;
  }

  /* Preview Section */
  .preview-section {
    background: #fff;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 5px 25px rgba(0,0,0,0.1);
  }

  .preview-section h3 {
    color: #215868;
    font-size: 24px;
    margin-bottom: 20px;
    text-align: center;
  }

  .certificates-preview {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
  }

  .cert-preview-card {
    width: 350px;
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 15px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }

  .cert-preview-card h4 {
    color: #004d40;
    margin: 0 0 10px 0;
    padding-bottom: 5px;
    border-bottom: 2px solid #004d40;
  }

  .cert-mini {
    font-size: 11px;
    line-height: 1.4;
    color: #333;
  }

  .cert-mini .mini-header {
    font-weight: bold;
    color: #003300;
    text-align: center;
  }

  .cert-mini .mini-divider {
    height: 2px;
    background: #004d40;
    margin: 8px 0;
  }

  .cert-mini .mini-meta {
    display: flex;
    justify-content: space-between;
    margin: 8px 0;
  }

  .cert-mini .mini-title {
    font-weight: bold;
    color: #005E00;
    text-align: center;
    margin: 8px 0;
  }

  .button-small {
    background-color: #215868;
    color: white;
    border: none;
    padding: 8px 15px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 12px;
    margin-top: 10px;
    width: 100%;
  }

  .button-small:hover {
    background-color: #1a4452;
  }
</style>
</head>
<body>
<div class="container">
  <div class="form-section">
    <h2>IJSSSR Certificate Generator</h2>

    <label>Certificate No: (6 digits)</label>
    <input type="text" id="certNo" placeholder="e.g., 250065" maxlength="6">
    
    <label>Author(s) Name (separate by comma):</label>
    <textarea id="authors" placeholder="e.g., Rachana Nigam, Pompee Dehingia" rows="2"></textarea>
    
    <label>Affiliation(s) (एक लाइन में एक author का affiliation):</label>
    <textarea id="affiliations" placeholder="e.g., Department of Physics, XYZ University&#10;Department of Chemistry, ABC College" rows="3"></textarea>
    
    <label>Paper Title:</label>
    <input type="text" id="title" placeholder="e.g., Advanced Research in Quantum Computing">
    
    <label>Paper ID: (IJSSSR-XXXX format)</label>
    <input type="text" id="paperId" placeholder="e.g., IJSSSR-0626">
    
    <label>Volume:</label>
    <input type="text" id="volume" placeholder="e.g., 5">
    
    <label>Issue No:</label>
    <select id="issue">
      <option value="">-- Select Issue --</option>
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
    </select>
    
    <label>Quarter/Month:</label>
    <select id="quarter">
      <option value="">-- Select Quarter --</option>
      <option>January-March</option>
      <option>April-June</option>
      <option>July-September</option>
      <option>October-December</option>
    </select>
    
    <label>Year:</label>
    <select id="year">
      <option value="">-- Select Year --</option>
      <option value="2023">2023</option>
      <option value="2024">2024</option>
      <option value="2025">2025</option>
      <option value="2026">2026</option>
      <option value="2027">2027</option>
      <option value="2028">2028</option>
      <option value="2029">2029</option>
      <option value="2030">2030</option>
      <option value="2031">2031</option>
      <option value="2032">2032</option>
      <option value="2033">2033</option>
      <option value="2034">2034</option>
      <option value="2035">2035</option>
      <option value="2036">2036</option>
      <option value="2037">2037</option>
      <option value="2038">2038</option>
      <option value="2039">2039</option>
      <option value="2040">2040</option>
      <option value="2041">2041</option>
      <option value="2042">2042</option>
      <option value="2043">2043</option>
      <option value="2044">2044</option>
      <option value="2045">2045</option>
      <option value="2046">2046</option>
      <option value="2047">2047</option>
      <option value="2048">2048</option>
      <option value="2049">2049</option>
      <option value="2050">2050</option>
    </select>
    
    <label>Date:</label>
    <input type="date" id="date">
    
    <label>QR Link:</label>
    <input type="text" id="qrLink" placeholder="e.g., https://ijsssr.com/paper/123">
    
    <div class="button-group">
      <button onclick="generatePreviews()">Preview Certificates</button>
      <button onclick="downloadAllPDFs()">Download All as PDF</button>
    </div>
  </div>

  <div class="preview-section" id="previewSection" style="display: none;">
    <h3>Certificate Previews</h3>
    <div id="certificatesPreview" class="certificates-preview"></div>
  </div>
</div>

// =========================================================
// JSON Data Load
// =========================================================
let certData = [];

fetch('https://ijsssr.github.io/pub_cert/certificate-data.json')
  .then(res => res.json())
  .then(data => { certData = data; })
  .catch(err => console.error("Data file not found!", err));

function showError(msg) {
  alert(msg);
}

// Certificate No. validation
document.getElementById("certNo").addEventListener("blur", function() {
  const value = this.value.trim();
  if(value && !/^\d{6}$/.test(value)){
    showError("Certificate No. must be 6 digits!");
    this.value = '';
    document.getElementById("paperId").value = '';
    return;
  }

  if(value && certData.length > 0) {
    const match = certData.find(d => d.certNo === value);
    if(match){
      document.getElementById("paperId").value = match.paperId;
    } else {
      document.getElementById("paperId").value = '';
      showError("Certificate No. not found!");
    }
  }
});

// Paper ID validation
document.getElementById("paperId").addEventListener("blur", function() {
  const value = this.value.trim();
  if(value && !/^IJSSSR-\d{4}$/.test(value)){
    showError("Paper ID must be in format IJSSSR-XXXX (4 digits)!");
    this.value = '';
    document.getElementById("certNo").value = '';
    return;
  }

  if(value && certData.length > 0) {
    const match = certData.find(d => d.paperId === value);
    if(match){
      document.getElementById("certNo").value = match.certNo;
    } else {
      document.getElementById("certNo").value = '';
      showError("Paper ID not found!");
    }
  }
});

function validateForm() {
  const certNo = document.getElementById("certNo").value.trim();
  const authors = document.getElementById("authors").value.trim();
  const affiliations = document.getElementById("affiliations").value.trim();
  const title = document.getElementById("title").value.trim();
  const paperId = document.getElementById("paperId").value.trim();
  const volume = document.getElementById("volume").value.trim();
  const issue = document.getElementById("issue").value;
  const quarter = document.getElementById("quarter").value;
  const year = document.getElementById("year").value;
  const date = document.getElementById("date").value;
  const qrLink = document.getElementById("qrLink").value.trim();

  if(!certNo || !authors || !affiliations || !title || !paperId || !volume || !issue || !quarter || !year || !date || !qrLink){
    alert("All fields are mandatory. Please fill all the fields.");
    return false;
  }
  
  if(!/^\d{6}$/.test(certNo)) {
    alert("Certificate No. must be 6 digits!");
    return false;
  }
  
  if(!/^IJSSSR-\d{4}$/.test(paperId)) {
    alert("Paper ID must be in format IJSSSR-XXXX (4 digits)!");
    return false;
  }
  
  return true;
}

// =========================================================
// Preview Generation
// =========================================================
async function generatePreviews() {
  if(!validateForm()) return;
  
  const previewContainer = document.getElementById("certificatesPreview");
  previewContainer.innerHTML = "";
  document.getElementById("previewSection").style.display = "block";
  
  const certNo = document.getElementById("certNo").value.trim();
  const authors = document.getElementById("authors").value.split(",").map(a => a.trim());
  const affLines = document.getElementById("affiliations").value.split("\n").map(a => a.trim());
  const title = document.getElementById("title").value.trim();
  const paperId = document.getElementById("paperId").value.trim();
  const volume = document.getElementById("volume").value.trim();
  const issue = document.getElementById("issue").value;
  const quarter = document.getElementById("quarter").value;
  const year = document.getElementById("year").value;
  const date = document.getElementById("date").value;
  
  for(let i = 0; i < authors.length; i++) {
    const currentAff = affLines[i] || affLines[0] || "";
    const thisCertNo = authors.length > 1 ? `${certNo}-${i+1}` : certNo;
    
    const card = document.createElement("div");
    card.className = "cert-preview-card";
    card.innerHTML = `
      <h4>Certificate ${i+1} of ${authors.length}</h4>
      <div class="cert-mini">
        <div class="mini-header">International Journal of Science and Social Science Research (IJSSSR)</div>
        <div class="mini-divider"></div>
        <div class="mini-meta">
          <span>Cert. No.: ${thisCertNo}</span>
          <span>Date: ${date}</span>
        </div>
        <div class="mini-title">CERTIFICATE OF PUBLICATION</div>
        <div><strong>Author:</strong> ${authors[i]}</div>
        <div><strong>Affiliation:</strong> ${currentAff.substring(0, 50)}${currentAff.length > 50 ? '...' : ''}</div>
        <div><strong>Paper:</strong> ${title.substring(0, 40)}${title.length > 40 ? '...' : ''}</div>
        <div><strong>Issue:</strong> Vol. ${volume} No. ${issue}, ${quarter} ${year}</div>
        <div><strong>Paper ID:</strong> ${paperId}</div>
      </div>
      <button class="button-small" onclick="downloadSinglePDF(${i})">Download PDF</button>
    `;
    previewContainer.appendChild(card);
  }
}

// =========================================================
// Single PDF Download
// =========================================================
async function downloadSinglePDF(index) {
  const certificates = await generateCertificatesData();
  if(certificates && certificates[index]) {
    await createPDF(certificates[index]);
  }
}

// =========================================================
// All PDFs Download
// =========================================================
async function downloadAllPDFs() {
  if(!validateForm()) return;
  
  const certificates = await generateCertificatesData();
  for(let i = 0; i < certificates.length; i++) {
    await createPDF(certificates[i]);
  }
}

// =========================================================
// Generate Certificates Data
// =========================================================
async function generateCertificatesData() {
  const certNo = document.getElementById("certNo").value.trim();
  const authors = document.getElementById("authors").value.split(",").map(a => a.trim());
  const affLines = document.getElementById("affiliations").value.split("\n").map(a => a.trim());
  const title = document.getElementById("title").value.trim();
  const paperId = document.getElementById("paperId").value.trim();
  const volume = document.getElementById("volume").value.trim();
  const issue = document.getElementById("issue").value;
  const quarter = document.getElementById("quarter").value;
  const year = document.getElementById("year").value;
  const date = document.getElementById("date").value;
  const qrLink = document.getElementById("qrLink").value.trim();

  const certificates = [];
  
  for(let i = 0; i < authors.length; i++) {
    const currentAff = affLines[i] || affLines[0] || "";
    const thisCertNo = authors.length > 1 ? `${certNo}-${i+1}` : certNo;
    
    // Generate QR Code
    const qrCanvas = document.createElement("canvas");
    await QRCode.toCanvas(qrCanvas, qrLink, { width: 100, margin: 1 });
    const qrDataURL = qrCanvas.toDataURL("image/png");
    
    certificates.push({
      certNo: thisCertNo,
      author: authors[i],
      affiliation: currentAff,
      title: title,
      paperId: paperId,
      volume: volume,
      issue: issue,
      quarter: quarter,
      year: year,
      date: date,
      qrDataURL: qrDataURL
    });
  }
  
  return certificates;
}

// =========================================================
// Create PDF with Fixed Bottom Section
// =========================================================
async function createPDF(certData) {
  const { jsPDF } = window.jspdf;
  
  const pdf = new jsPDF({
    orientation: 'portrait',
    unit: 'px',
    format: 'a4'
  });
  
  const pageWidth = pdf.internal.pageSize.getWidth();
  const pageHeight = pdf.internal.pageSize.getHeight();
  const margin = 50;
  const contentWidth = pageWidth - (margin * 2);
  
  // Set font
  pdf.setFont("Times", "Roman");
  
  // Watermark (अगर दिया है तो)
  
  // Logo (अगर दिया है तो)
  if(LOGO_IMAGE_BASE64) {
    try {
      pdf.addImage(LOGO_IMAGE_BASE64, 'PNG', 40, 30, 70, 70);
    } catch(e) {
      // Placeholder
      pdf.setDrawColor(200, 200, 200);
      pdf.setFillColor(250, 250, 250);
      pdf.roundedRect(40, 30, 70, 70, 5, 5, 'FD');
    }
  } else {
    pdf.setDrawColor(200, 200, 200);
    pdf.setFillColor(250, 250, 250);
    pdf.roundedRect(40, 30, 70, 70, 5, 5, 'FD');
  }
  
  // ISSN
  pdf.setTextColor(0, 51, 102);
  pdf.setFontSize(11);
  pdf.text("ISSN: 2583-7877", pageWidth - 120, 50);
  
  // Journal Name
  pdf.setTextColor(0, 51, 0);
  pdf.setFontSize(24);
  pdf.setFont("Times", "bold");
  pdf.text("International Journal of Science and", pageWidth/2, 120, { align: 'center' });
  pdf.text("Social Science Research (IJSSSR)", pageWidth/2, 145, { align: 'center' });
  
  pdf.setFontSize(12);
  pdf.setFont("Times", "italic");
  pdf.text("UGC Approved Peer Reviewed (Refereed) Journal", pageWidth/2, 170, { align: 'center' });
  
  pdf.setFont("Times", "normal");
  pdf.setTextColor(0, 51, 0);
  pdf.textWithLink("www.ijsssr.com", pageWidth/2, 190, { align: 'center', url: 'https://www.ijsssr.com' });
  
  // Divider
  pdf.setDrawColor(0, 100, 0);
  pdf.setLineWidth(2);
  pdf.line(margin, 210, pageWidth - margin, 210);
  
  // Meta Info
  pdf.setTextColor(0, 51, 102);
  pdf.setFontSize(11);
  pdf.setFont("Times", "bold");
  pdf.text(`Certificate No.: ${certData.certNo}`, margin, 240);
  pdf.text(`Date: ${certData.date}`, pageWidth - 120, 240);
  
  // Certificate Header
  pdf.setTextColor(0, 94, 0);
  pdf.setFontSize(26);
  pdf.setFont("Times", "bold");
  pdf.text("CERTIFICATE OF PUBLICATION", pageWidth/2, 300, { align: 'center' });
  
  // =========================================================
  // MAIN CONTENT - PERFECT FORMATTING
  // =========================================================
  
  let yPos = 350;
  const lineHeight = 22; // अच्छी spacing
  const normalColor = '#000000';
  const highlightColor = '#002060'; // सिर्फ इन्हें ब्लू रखना है
  
  // Create the complete paragraph text
  const paragraphText = `This is to certify that ${certData.author}, ${certData.affiliation} has published a paper/article entitled "${certData.title}" in the issue Vol. ${certData.volume} No. ${certData.issue}, ${certData.quarter} ${certData.year} with paper ID ${certData.paperId}.`;
  
  // Split text into lines - Font size 12 (थोड़ा बड़ा)
  pdf.setFontSize(12);
  
  const textLines = pdf.splitTextToSize(paragraphText, contentWidth);
  
  // Print each line with proper highlighting
  for (let i = 0; i < textLines.length; i++) {
    const line = textLines[i];
    
    // Check what this line contains and apply colors accordingly
    if (line.includes(certData.author) && !line.includes(certData.affiliation.substring(0, 15))) {
      // Line contains author name (but not affiliation)
      const beforeAuthor = line.substring(0, line.indexOf(certData.author));
      const afterAuthor = line.substring(line.indexOf(certData.author) + certData.author.length);
      
      // Before author - normal black
      pdf.setFont("Times", "normal");
      pdf.setTextColor(normalColor);
      pdf.text(beforeAuthor, margin, yPos);
      
      // Author name - blue bold
      const beforeWidth = pdf.getTextWidth(beforeAuthor);
      pdf.setFont("Times", "bold");
      pdf.setTextColor(highlightColor);
      pdf.text(certData.author, margin + beforeWidth, yPos);
      
      // After author - normal black
      const authorWidth = pdf.getTextWidth(certData.author);
      pdf.setFont("Times", "normal");
      pdf.setTextColor(normalColor);
      pdf.text(afterAuthor, margin + beforeWidth + authorWidth, yPos);
    }
    else if (line.includes(certData.affiliation.substring(0, 20)) && !line.includes('"' + certData.title.substring(0, 10))) {
      // Line contains affiliation - blue bold
      pdf.setFont("Times", "bold");
      pdf.setTextColor(highlightColor);
      pdf.text(line, margin, yPos);
    }
    else if (line.includes('"' + certData.title.substring(0, 10))) {
      // Line contains paper title - blue bold
      pdf.setFont("Times", "bold");
      pdf.setTextColor(highlightColor);
      pdf.text(line, margin, yPos);
    }
    else if (line.includes(`Vol. ${certData.volume}`) || line.includes(certData.paperId)) {
      // Line contains issue details or paper ID - blue bold
      pdf.setFont("Times", "bold");
      pdf.setTextColor(highlightColor);
      pdf.text(line, margin, yPos);
    }
    else {
      // Normal text - black
      pdf.setFont("Times", "normal");
      pdf.setTextColor(normalColor);
      pdf.text(line, margin, yPos);
    }
    
    yPos += lineHeight;
  }
  
  // Add some space before bottom section
  yPos += 15;
  
  // =========================================================
  // BOTTOM SECTION - FIXED POSITION
  // =========================================================
  
  // Fixed bottom position
  const bottomY = pageHeight - 120;
  
  // Left Editor (Dr. Ashish Kumar Shukla)
  if(SIGNATURE_1_BASE64) {
    try {
      pdf.addImage(SIGNATURE_1_BASE64, 'PNG', margin, bottomY - 30, 80, 30);
    } catch(e) {
      pdf.setDrawColor(200, 200, 200);
      pdf.setFillColor(250, 250, 250);
      pdf.roundedRect(margin, bottomY - 20, 80, 30, 5, 5, 'FD');
    }
  } else {
    pdf.setDrawColor(200, 200, 200);
    pdf.setFillColor(250, 250, 250);
    pdf.roundedRect(margin, bottomY - 20, 80, 30, 5, 5, 'FD');
  }
  
  pdf.setTextColor(0, 0, 0);
  pdf.setFontSize(11);
  pdf.setFont("Times", "bold");
  pdf.text("Dr. Ashish Kumar Shukla", margin, bottomY + 20);
  pdf.setFont("Times", "normal");
  pdf.text("Editor-in-Chief", margin, bottomY + 35);
  pdf.setTextColor(0, 51, 102);
  pdf.setFontSize(10);
  pdf.text("editors@ijsssr.com", margin, bottomY + 50);
  
  // QR Code
  pdf.addImage(certData.qrDataURL, 'PNG', pageWidth/2 - 35, bottomY - 10, 65, 65);
  pdf.setTextColor(51, 51, 51);
  pdf.setFontSize(10);
  pdf.text("Verified Published Article", pageWidth/2, bottomY + 65, { align: 'center' });
  
  // Right Editor (Dr. Gagan Prit Kaur)
  if(SIGNATURE_2_BASE64) {
    try {
      pdf.addImage(SIGNATURE_2_BASE64, 'PNG', pageWidth - margin - 80, bottomY - 30, 80, 30);
    } catch(e) {
      pdf.setDrawColor(200, 200, 200);
      pdf.setFillColor(250, 250, 250);
      pdf.roundedRect(pageWidth - margin - 80, bottomY - 20, 80, 30, 5, 5, 'FD');
    }
  } else {
    pdf.setDrawColor(200, 200, 200);
    pdf.setFillColor(250, 250, 250);
    pdf.roundedRect(pageWidth - margin - 80, bottomY - 20, 80, 30, 5, 5, 'FD');
  }
  
  pdf.setTextColor(0, 0, 0);
  pdf.setFontSize(11);
  pdf.setFont("Times", "bold");
  pdf.text("Dr. Gagan Prit Kaur", pageWidth - margin - 80, bottomY + 20);
  pdf.setFont("Times", "normal");
  pdf.text("Editor-in-Chief", pageWidth - margin - 80, bottomY + 35);
  pdf.setTextColor(0, 51, 102);
  pdf.setFontSize(10);
  pdf.text("editorinchief@ijsssr.com", pageWidth - margin - 80, bottomY + 50);
  
  // Save PDF
  pdf.save(`${certData.certNo}.pdf`);
}

// Initialize
window.onload = function() {
  document.getElementById("previewSection").style.display = "none";
};
</script>
